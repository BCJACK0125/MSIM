name: 每日定時玉山優惠爬蟲與郵件通知

on:
  schedule:
    # 每天台北時間 09:00 執行一次 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允許你隨時點擊手動測試發信

jobs:
  run_scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 複製儲存庫程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝輕量解析套件
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. 執行爬蟲並發送 Gmail 
      # 關鍵：在這裡將 GitHub 密鑰傳遞給 Python 程式
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python scraper.py

    - name: 5. 備份 JSON 變更回 GitHub 倉庫
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add esun_discounts.json
        
        if ! git diff --cached --quiet; then
          git commit -m "自動備份：更新優惠資料紀錄 ($(date +'%Y-%m-%d %H:%M'))"
          git push
        else
          echo "資料與昨日相同，僅發送信件，不重複提交 Commit。"
        fi
